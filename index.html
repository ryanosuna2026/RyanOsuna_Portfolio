<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ryan Paul Osuna | Modern Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --tric-black: #2f3133;
      --sconce-gold: #a67b32;
      --in-the-navy: #2b4258;
      --essential-gray: #d9d7d2;

      --bg: #17181a;
      --bg-2: #202327;
      --panel: rgba(43, 66, 88, 0.24);
      --panel-2: rgba(255, 255, 255, 0.05);
      --text: #f6f4ef;
      --muted: #c9c4bb;
      --soft: #9fa6ad;
      --line: rgba(255,255,255,0.08);
      --gold-glow: rgba(166, 123, 50, 0.34);
      --navy-glow: rgba(43, 66, 88, 0.42);
      --white-glow: rgba(217, 215, 210, 0.18);
      --shadow-xl: 0 30px 80px rgba(0,0,0,0.42);
      --shadow-lg: 0 18px 40px rgba(0,0,0,0.28);
      --radius-xl: 30px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --max-width: 1260px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at 15% 20%, rgba(166,123,50,0.16), transparent 28%),
        radial-gradient(circle at 85% 10%, rgba(43,66,88,0.34), transparent 26%),
        radial-gradient(circle at 50% 100%, rgba(217,215,210,0.06), transparent 30%),
        linear-gradient(145deg, #121315 0%, #17181a 38%, #1f2327 100%);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 52px 52px;
      opacity: 0.18;
      pointer-events: none;
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.18), rgba(0,0,0,0.24));
      pointer-events: none;
      z-index: -1;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .container {
      width: min(var(--max-width), calc(100% - 42px));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(20, 22, 24, 0.66);
      backdrop-filter: blur(22px);
      border-bottom: 1px solid rgba(217,215,210,0.09);
      box-shadow: 0 10px 30px rgba(0,0,0,0.16);
    }

    .nav {
      min-height: 74px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
      flex-wrap: wrap;
      padding: 12px 22px;
    }

    .nav a {
      font-size: 0.96rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--essential-gray);
      opacity: 0.74;
      position: relative;
      transition: 0.25s ease;
    }

    .nav a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -10px;
      width: 100%;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, var(--sconce-gold), transparent);
      transform: scaleX(0);
      transition: transform 0.28s ease;
    }

    .nav a:hover,
    .nav a.active {
      opacity: 1;
      color: #fff;
      text-shadow: 0 0 12px rgba(217,215,210,0.16);
    }

    .nav a:hover::after,
    .nav a.active::after {
      transform: scaleX(1);
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(10,10,10,0.42), rgba(10,10,10,0.62)),
        url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=1800&q=80') center/cover no-repeat;
      filter: blur(3px) saturate(0.7) brightness(0.7);
      transform: scale(1.07);
      z-index: -2;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 24% 36%, rgba(166,123,50,0.14), transparent 24%),
        radial-gradient(circle at 76% 30%, rgba(43,66,88,0.26), transparent 30%),
        linear-gradient(180deg, rgba(0,0,0,0.12), rgba(0,0,0,0.5));
      z-index: -1;
    }

    .hero-inner {
      width: min(var(--max-width), calc(100% - 42px));
      margin: 0 auto;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 48px;
      align-items: center;
      padding: 130px 0 90px;
    }

    .profile-wrap {
      display: flex;
      justify-content: center;
    }

    .profile-ring {
      width: 240px;
      aspect-ratio: 1;
      border-radius: 50%;
      padding: 7px;
      background: linear-gradient(145deg, var(--essential-gray), var(--sconce-gold), var(--in-the-navy));
      box-shadow:
        0 0 0 10px rgba(255,255,255,0.03),
        0 0 40px rgba(166,123,50,0.22),
        0 0 65px rgba(43,66,88,0.26),
        var(--shadow-xl);
      position: relative;
      animation: floaty 6s ease-in-out infinite;
    }

    .profile-ring::before {
      content: "";
      position: absolute;
      inset: -16px;
      border-radius: 50%;
      border: 1px solid rgba(217,215,210,0.12);
      box-shadow: 0 0 38px rgba(217,215,210,0.06);
    }

    .profile-ring img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      filter: brightness(0.95) contrast(1.05);
    }

    .hero-copy {
      max-width: 860px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 18px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      box-shadow: inset 0 0 20px rgba(255,255,255,0.02), 0 0 28px rgba(43,66,88,0.12);
      margin-bottom: 22px;
    }

    .hero-copy h1 {
      font-family: 'Manrope', sans-serif;
      font-size: clamp(2.9rem, 6vw, 5.5rem);
      line-height: 0.95;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 900;
      margin-bottom: 18px;
      text-wrap: balance;
      text-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }

    .hero-copy h1 span {
      color: var(--essential-gray);
      display: inline-block;
      text-shadow:
        0 0 22px rgba(217,215,210,0.12),
        0 0 40px rgba(166,123,50,0.12);
    }

    .hero-role {
      font-size: clamp(1rem, 2vw, 1.28rem);
      line-height: 1.6;
      color: #f2ede4;
      font-weight: 700;
      margin-bottom: 24px;
    }

    .hero-role .dot {
      color: var(--sconce-gold);
      margin: 0 10px;
    }

    .hero-line {
      width: min(760px, 100%);
      height: 4px;
      border-radius: 999px;
      margin: 24px 0 26px;
      background: linear-gradient(90deg, var(--essential-gray), var(--sconce-gold), var(--in-the-navy), transparent);
      box-shadow: 0 0 24px rgba(166,123,50,0.22);
    }

    .hero-menu {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.18);
      width: fit-content;
      max-width: 100%;
    }

    .hero-menu a {
      text-transform: uppercase;
      font-size: 0.98rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      color: white;
      position: relative;
      transition: 0.25s ease;
    }

    .hero-menu a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -8px;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, var(--sconce-gold), var(--essential-gray));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.25s ease;
    }

    .hero-menu a:hover {
      color: var(--essential-gray);
      text-shadow: 0 0 16px rgba(217,215,210,0.18);
    }

    .hero-menu a:hover::after {
      transform: scaleX(1);
    }

    .section {
      padding: 96px 0;
      position: relative;
    }

    .section-title {
      font-family: 'Manrope', sans-serif;
      font-size: clamp(2rem, 4vw, 3.2rem);
      line-height: 1.05;
      margin-bottom: 16px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .section-subtitle {
      max-width: 760px;
      color: var(--muted);
      line-height: 1.8;
      font-size: 1.04rem;
      margin-bottom: 44px;
    }

    .glass-card {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03)),
        linear-gradient(135deg, rgba(43,66,88,0.08), rgba(166,123,50,0.06));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-xl);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow-xl);
      overflow: hidden;
      position: relative;
    }

    .glass-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.05), transparent 40%);
      pointer-events: none;
    }

    .about-grid {
      display: grid;
      grid-template-columns: 1.03fr 1fr;
      gap: 30px;
      align-items: stretch;
    }

    .about-copy {
      padding: 42px;
    }

    .quote-mark {
      font-size: 4.5rem;
      line-height: 1;
      color: rgba(166,123,50,0.58);
      margin-bottom: 8px;
      text-shadow: 0 0 26px rgba(166,123,50,0.18);
    }

    .lead-quote {
      font-family: 'Manrope', sans-serif;
      font-size: clamp(1.9rem, 3vw, 2.9rem);
      line-height: 1.12;
      font-weight: 900;
      max-width: 14ch;
      margin-bottom: 18px;
      text-transform: uppercase;
    }

    .mini-line {
      width: 88px;
      height: 5px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--essential-gray), var(--sconce-gold));
      margin-bottom: 22px;
      box-shadow: 0 0 18px rgba(166,123,50,0.22);
    }

    .about-copy p {
      color: #ece8df;
      line-height: 1.8;
      font-size: 1.06rem;
      margin-bottom: 14px;
    }

    .about-copy strong {
      color: white;
    }

    .accent-text {
      color: #ffd18f;
      font-weight: 800;
    }

    .contact-form {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 28px;
    }

    .contact-form input {
      flex: 1 1 260px;
      padding: 20px 20px;
      border: 1px solid rgba(217,215,210,0.12);
      border-radius: 18px;
      background: rgba(255,255,255,0.9);
      color: #23262b;
      font-size: 1.03rem;
      outline: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      transition: 0.25s ease;
    }

    .contact-form input:focus {
      transform: translateY(-2px);
      box-shadow: 0 0 0 4px rgba(166,123,50,0.14), 0 18px 34px rgba(0,0,0,0.14);
    }

    .btn {
      border: none;
      padding: 18px 28px;
      border-radius: 18px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 800;
      transition: 0.28s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--sconce-gold), #bd8f3d);
      color: white;
      box-shadow: 0 14px 30px rgba(166,123,50,0.28), 0 0 30px rgba(166,123,50,0.12);
    }

    .btn-primary:hover {
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 18px 34px rgba(166,123,50,0.36), 0 0 34px rgba(166,123,50,0.18);
    }

    .about-visual {
      padding: 24px;
    }

    .visual-card {
      min-height: 540px;
      height: 100%;
      border-radius: 28px;
      background:
        radial-gradient(circle at 10% 90%, rgba(255,255,255,0.08), transparent 24%),
        linear-gradient(145deg, #8f6423 0%, var(--sconce-gold) 32%, #855f28 50%, var(--in-the-navy) 100%);
      position: relative;
      overflow: hidden;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        0 24px 50px rgba(0,0,0,0.26),
        0 0 40px rgba(43,66,88,0.12);
    }

    .visual-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.14), transparent 34%),
        linear-gradient(35deg, rgba(0,0,0,0.12), transparent 40%);
    }

    .visual-shape {
      position: absolute;
      left: 0;
      top: 0;
      width: 210px;
      height: 100%;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.03)),
        linear-gradient(145deg, rgba(255,209,143,0.48), rgba(255,255,255,0.06));
      clip-path: polygon(0 0, 65% 0, 100% 10%, 100% 90%, 64% 100%, 0 100%);
      opacity: 0.92;
    }

    .visual-content {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      align-items: center;
      height: 100%;
      padding: 34px;
      gap: 12px;
    }

    .visual-copy h3 {
      font-family: 'Manrope', sans-serif;
      font-size: clamp(2.2rem, 3vw, 3.9rem);
      line-height: 1;
      letter-spacing: 0.05em;
      color: #fff7ea;
      margin-bottom: 18px;
      text-transform: uppercase;
      text-shadow:
